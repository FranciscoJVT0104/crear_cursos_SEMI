<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CREAR CURSO SEMI</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: flex-end;
            justify-content: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: 0.25rem;
        }

        input[type="file"],
        input[type="date"] {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
            outline: none;
        }

        input[type="file"]:hover,
        input[type="date"]:hover {
            border-color: var(--primary);
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        button.outline:hover {
            background: #f1f5f9;
            box-shadow: none;
        }

        .table-container {
            max-height: 500px;
            overflow: auto;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: white;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
        }

        th {
            background: #f1f5f9;
            padding: 1rem;
            text-align: left;
            position: sticky;
            top: 0;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }
    </style>
</head>

<body>

    <h2>CURSOS SEMI</h2>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label for="startDate">Fecha de Inicio</label>
                <input type="date" id="startDate" value="2026-03-13" />
            </div>
            <div class="input-group">
                <label for="fileInput">Archivo Excel/CSV</label>
                <input type="file" id="fileInput" />
            </div>
            <button onclick="procesar()">Procesar</button>
        </div>

        <div class="controls" id="downloadControls" style="display: none;">
            <button onclick="descargar()">Cursos</button>
            <button class="outline" onclick="descargarCategorias()">Categorías</button>
            <button class="outline" onclick="descargarCategoryPath()">Solo Path</button>
        </div>

        <h3 style="font-family: 'Outfit'; margin-top: 0;">Vista previa</h3>
        <div class="table-container">
            <table id="previewTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>


    <script>
        function quitarTildes(texto) {
            if (!texto) return "";
            return texto
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        function limpiarCelular(valor) {
            if (!valor) return "";
            return valor.toString().replace(/\D/g, "");
        }

        /* =======================
           VARIABLES GLOBALES
        ======================= */
        let resultadoPreview = [];
        let resultadoCategorias = [];
        let globalCarrera3 = "";

        function U(val) {
            if (val === null || val === undefined) return "";
            return val
                .toString()
                .trim()
                .toUpperCase();
        }

        /* =======================
           TABLAS DE CONVERSIÓN
        ======================= */
        const turnos = {
            M: "MAÑANA",
            R: "MAÑANA",
            H: "MAÑANA",
            T: "TARDE",
            N: "NOCHE",
            P: "NOCHE",
            L: "NOCHE"
        };

        function formatearDocente(nombre) {
            if (!nombre || nombre.toString().trim() === "") {
                return "SIN DOCENTE";
            }
            return `DOCENTE - ${nombre.toString().trim()}`;
        }

        function normalizarAula(aula) {
            if (!aula) return "";
            return aula
                .toString()
                .trim()
                .toUpperCase()
                .replace(/\s+/g, "")
                .replace(/-/g, "");
        }

        function normalizarCiclo(valor) {
            if (!valor) return "";

            const romanos = {
                "I": 1,
                "II": 2,
                "III": 3,
                "IV": 4,
                "V": 5,
                "VI": 6
            };

            const v = valor.toString().trim().toUpperCase();

            // Si es romano
            if (romanos[v]) {
                return romanos[v];
            }

            // Si ya es número
            const num = parseInt(v, 10);
            if (!isNaN(num) && num >= 1 && num <= 6) {
                return num;
            }

            // Si no coincide, lo devuelve tal cual (para detectar errores)
            return v;
        }


        function normalizarTurno(valor) {
            if (!valor) {
                return { corto: "", completo: "" };
            }

            const v = valor.toString().trim().toUpperCase();

            // Turno real permitido
            if (v === "M" || v === "R" || v === "H") {
                return { corto: "M", completo: "MAÑANA" };
            }

            if (v === "T") {
                return { corto: "T", completo: "TARDE" };
            }

            if (v === "N" || v === "P" || v === "L") {
                return { corto: "N", completo: "NOCHE" };
            }

            // Fallback por si viene algo raro
            return { corto: v, completo: v };
        }

        function obtenerDocentePorCurso(r, index, totalCursos) {

            const docente1 = limpiarTexto(r["DOCENTE 1"]);
            const docente2 = limpiarTexto(r["DOCENTE 2"]);

            if (docente1 && docente2) {
                return index === 0 ? docente1 : docente2;
            }

            if (docente1) return docente1;

            if (docente2) return docente2;

            return "";
        }

        function limpiarTexto(texto) {
            if (!texto) return "";

            return texto
                .toString()
                .trim()
                .replace(/\s+/g, " "); // reemplaza múltiples espacios por uno solo
        }

        function obtenerTelefonoPorCurso(r, index, totalCursos) {

            const tel1 = limpiarCelular(r["TELEFONO 1"]);
            const tel2 = limpiarCelular(r["TELEFONO 2"]);

            if (tel1 && tel2) {
                return index === 0 ? tel1 : tel2;
            }

            if (tel1) return tel1;

            if (tel2) return tel2;

            return "";
        }
        /* =======================
           FUNCIONES AUXILIARES
        ======================= */
        function normalizarLocal(valor) {
            if (!valor) return { abrev: "UNK", full: "" };
            valor = valor.toUpperCase().trim();
            return locales[valor] || { abrev: "UNK", full: valor };
        }

        function primerasLetras(texto, n) {
            if (!texto) return "";

            return texto
                .toString()
                .trim()
                .replace(/[^A-ZÁÉÍÓÚÜÑ ]/gi, "")
                .substring(0, n)
                .toUpperCase();
        }


        function csvCell(value) {
            if (value === null || value === undefined) return "";
            value = value.toString();
            if (value.includes("|") || value.includes('"') || value.includes("\n")) {
                value = value.replace(/"/g, '""');
                return `"${value}"`;
            }
            return value;
        }

        function obtenerAulaPorCurso(r, index, totalCursos) {
            if (totalCursos > 1) {
                // Curso 1 → AULA
                if (index === 0) return normalizarAula(r.AULA);

                // Curso 2 → AULA2 o AULA si no existe
                return normalizarAula(r.AULA2 || r.AULA);
            }
            // Solo un curso → AULA
            return normalizarAula(r.AULA);
        }

        function descargarCategorias() {
            if (resultadoCategorias.length === 0) {
                alert("No hay datos de categorías");
                return;
            }

            const csv = resultadoCategorias
                .map(row => row.map(csvCell).join(";"))
                .join("\n");

            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csv], {
                type: "text/csv;charset=utf-8;"
            });

            const suffix = globalCarrera3 ? ` - ${globalCarrera3}` : "";
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `categorias${suffix}.csv`;
            a.click();
        }

        function descargarCategoryPath() {
            if (resultadoCategorias.length === 0) {
                alert("No hay datos de categorías");
                return;
            }

            // Extract only the first column (category_path)
            const csv = resultadoCategorias
                .map(row => csvCell(row[0]))
                .join("\n");

            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csv], {
                type: "text/csv;charset=utf-8;"
            });

            const suffix = globalCarrera3 ? ` - ${globalCarrera3}` : "";
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `paths${suffix}.csv`;
            a.click();
        }

        /* =======================
           PROCESAMIENTO
        ======================= */
        function procesar() {
            const file = document.getElementById("fileInput").files[0];
            const dateVal = document.getElementById("startDate").value;
            if (!file) return alert("Seleccione un archivo");
            if (!dateVal) return alert("Seleccione una fecha de inicio");

            // Logic for date
            const dateObj = new Date(dateVal + "T00:00:00");
            const yearFull = dateObj.getFullYear();
            const year2d = yearFull.toString().slice(-2);
            const monthIdx = dateObj.getMonth();
            const startdateStr = dateVal.replace(/-/g, ""); // YYYYMMDD

            const monthCodes = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SET", "OCT", "NOV", "DIC"];
            const monthNames = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

            const monthCode = monthCodes[monthIdx];
            const monthName = monthNames[monthIdx];
            const tagFecha = `-${monthCode}${year2d}-`;

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: "array" });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                let rows = XLSX.utils.sheet_to_json(sheet);

                resultadoPreview = [];
                resultadoCategorias = [];
                globalCarrera3 = ""; // Reset variable per processing run

                const headers = [
                    "shortname", "fullname", "carrera_aula", "turno", "horario",
                    "dni_docente", "docente", "celular_docente", "acceso_docente",
                    "tutor", "numero_estudiantes", "url", "template"
                ];

                resultadoPreview.push(headers);

                resultadoCategorias.push([
                    "category_path",
                    "shortname",
                    "fullname",
                    "format",
                    "templatecourse",
                    "startdate",
                    "enddate"
                ]);

                rows.forEach(r => {
                    const turno = normalizarTurno(r.TURNO);

                    const carreraLimpia = limpiarTexto(r.CARRERA);
                    const carrera3 = primerasLetras(carreraLimpia, 3);
                    if (!globalCarrera3 && carrera3) globalCarrera3 = carrera3; // Save for file naming

                    const ciclo = normalizarCiclo(r.CICLO);
                    const horario = r.horario || r.HORARIO || "";
                    const cantidad = r.CANTIDAD || "";

                    // Búsqueda robusta de columna PRACTICA
                    let esPractica = false;
                    for (let key in r) {
                        if (key.trim().toUpperCase() === "PRACTICA") {
                            if (r[key] && r[key].toString().toUpperCase().trim() === "X") {
                                esPractica = true;
                            }
                            break;
                        }
                    }
                    const templateCourse = esPractica ? "AULA_PRACTICA" : "AULA_TEORICO";

                    const cursos = [];

                    // CURSO 1
                    if (r["CURSO 1"]) {
                        cursos.push({
                            curso: limpiarTexto(r["CURSO 1"]),
                        });
                    }

                    // CURSO 2
                    if (r["CURSO 2"]) {
                        cursos.push({
                            curso: limpiarTexto(r["CURSO 2"]),
                        });
                    }

                    cursos.forEach((c, i) => {
                        const sufijo = cursos.length > 1 ? (i === 0 ? "-A" : "-B") : "";

                        const aula = obtenerAulaPorCurso(r, i, cursos.length);

                        // curso4 para shortname: sin tildes
                        const curso4Short = quitarTildes(primerasLetras(c.curso, 4));

                        // curso4 para fullname: con tildes
                        const curso4Full = primerasLetras(c.curso, 4);

                        const docenteFinal = obtenerDocentePorCurso(r, i, cursos.length);
                        const telefonoFinal = obtenerTelefonoPorCurso(r, i, cursos.length);

                        const shortname =
                            `AULA${aula}${sufijo}${tagFecha}${carrera3}-${ciclo}-${curso4Short}`;

                        const nombreCurso = limpiarTexto(c.curso);
                        const fullname = `AULA${aula}${sufijo}-${carrera3}-${ciclo}${tagFecha}${nombreCurso}`;

                        resultadoPreview.push([
                            U(shortname),
                            U(fullname),
                            U(carreraLimpia),
                            U(turno.completo),
                            U(horario),
                            "",
                            U(formatearDocente(docenteFinal)),
                            U(telefonoFinal),
                            "SI",
                            "",
                            U(cantidad),
                            "",
                            templateCourse
                        ]);

                        // CSV de categorías
                        resultadoCategorias.push([
                            U(`SEMIPRESENCIAL / ${yearFull} / ${monthName} / ${r.CARRERA} / ${ciclo}C / ${turno.corto}`),
                            U(shortname),
                            U(fullname),
                            "tiles",
                            templateCourse,
                            startdateStr,
                            "0"
                        ]);
                    });
                });

                document.getElementById("downloadControls").style.display = "flex";
                renderPreviewTable();
            };

            reader.readAsArrayBuffer(file);
        }

        /* =======================
           VISTA PREVIA
        ======================= */
        function renderPreviewTable() {
            const table = document.getElementById("previewTable");
            const thead = table.querySelector("thead");
            const tbody = table.querySelector("tbody");

            thead.innerHTML = "";
            tbody.innerHTML = "";

            const trHead = document.createElement("tr");
            resultadoPreview[0].forEach(h => {
                const th = document.createElement("th");
                th.textContent = h;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            for (let i = 1; i < resultadoPreview.length; i++) {
                const tr = document.createElement("tr");
                resultadoPreview[i].forEach(cell => {
                    const td = document.createElement("td");
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }
        }

        /* =======================
           DESCARGA CSV UTF-8 BOM
        ======================= */
        function descargar() {
            if (resultadoPreview.length === 0) {
                alert("No hay datos procesados");
                return;
            }

            const csv = resultadoPreview
                .map(row => row.map(csvCell).join(";"))
                .join("\n");

            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);

            const suffix = globalCarrera3 ? ` - ${globalCarrera3}` : "";
            const a = document.createElement("a");
            a.href = url;
            a.download = `cursos${suffix}.csv`;
            a.click();
        }
    </script>

</body>

</html>
